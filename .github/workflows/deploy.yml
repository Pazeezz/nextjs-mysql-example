name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js with dependency caching
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Install all dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint to catch code quality issues before deploying
      - name: Run linter
        run: npm run lint

      # Step 5: SSH into the server, pull latest code, and redeploy
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e

            APP_DIR="/home/pasindu/app"

            echo "==> Pulling latest code..."
            cd "$APP_DIR"
            git pull origin main

            echo "==> Stopping existing containers..."
            docker compose down --remove-orphans

            echo "==> Building and starting containers..."
            docker compose build --no-cache
            docker compose up -d

            echo "==> Removing dangling images to free disk space..."
            docker image prune -f

            echo "==> Verifying app container is running..."
            sleep 5
            docker compose ps

            echo "==> Deployment complete!"